<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 820" width="680" style="max-height: 600px" height="820">
<defs>
  <marker orient="auto-start-reverse" markerHeight="6" markerWidth="6" refY="5" refX="8" viewBox="0 0 10 10" id="arrow">
    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" stroke="#aaa" fill="none" d="M2 1L8 5L2 9"/>
  </marker>
  <marker orient="auto-start-reverse" markerHeight="6" markerWidth="6" refY="5" refX="8" viewBox="0 0 10 10" id="arrow-red">
    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" stroke="#c0392b" fill="none" d="M2 1L8 5L2 9"/>
  </marker>
  <marker orient="auto-start-reverse" markerHeight="6" markerWidth="6" refY="5" refX="8" viewBox="0 0 10 10" id="arrow-gold">
    <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" stroke="#d4a017" fill="none" d="M2 1L8 5L2 9"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .title { font-size: 16px; font-weight: 700; fill: #f0ece0; }
    .room-title { font-size: 15px; font-weight: 700; }
    .room-body  { font-size: 12px; font-weight: 400; }
    .lbl        { font-size: 11px; fill: #b0a898; }
  </style>
</defs>

<!-- Background -->
<rect fill="#111111" height="820" width="680"/>

<!-- Title -->
<text text-anchor="middle" y="34" x="340" class="title">Dungeon — room &amp; class sketch (C#)</text>


<!-- ============ ROW 1: WinRoom (top center) ============ -->
<rect stroke-width="1" stroke="#8a6000" fill="#4a3000" rx="12" height="110" width="200" y="55" x="240"/>
<text fill="#f0d080" text-anchor="middle" y="82" x="340" class="room-title">4. WinRoom</text>
<text fill="#c8a840" text-anchor="middle" y="102" x="340" class="room-body">Locked: needs Key</text>
<text fill="#c8a840" text-anchor="middle" y="119" x="340" class="room-body">Exits: none (you won!)</text>
<text fill="#c8a840" text-anchor="middle" y="143" x="340" class="room-body">→ GAME WIN</text>

<!-- Arrow: Start ↑ WinRoom (gold dashed = locked) -->
<line marker-end="url(#arrow-gold)" stroke-dasharray="7 4" stroke-width="1.5" stroke="#d4a017" y2="165" x2="340" y1="220" x1="340"/>
<text y="200" x="350" class="lbl">needs Key</text>


<!-- ============ ROW 2: DeathRoom — Start — KeyRoom ============ -->

<!-- DeathRoom (left) -->
<rect stroke-width="1" stroke="#8a2020" fill="#5a1515" rx="12" height="120" width="185" y="230" x="20"/>
<text fill="#f0c0c0" text-anchor="middle" y="257" x="112" class="room-title">2. DeathRoom</text>
<text fill="#d0a0a0" text-anchor="middle" y="277" x="112" class="room-body">DEADLY: instant death</text>
<text fill="#d0a0a0" text-anchor="middle" y="294" x="112" class="room-body">Items: none</text>
<text fill="#d0a0a0" text-anchor="middle" y="311" x="112" class="room-body">Monster: none</text>
<text fill="#d0a0a0" text-anchor="middle" y="328" x="112" class="room-body">☠ GAME OVER</text>

<!-- Start (center) -->
<rect stroke-width="1" stroke="#6a6a6a" fill="#4a4a4a" rx="12" height="120" width="200" y="230" x="240"/>
<text fill="#e8e0d0" text-anchor="middle" y="257" x="340" class="room-title">1. Start</text>
<text fill="#b8b0a0" text-anchor="middle" y="277" x="340" class="room-body">Items: none</text>
<text fill="#b8b0a0" text-anchor="middle" y="294" x="340" class="room-body">Monster: none</text>
<text fill="#b8b0a0" text-anchor="middle" y="311" x="340" class="room-body">Exits: N E S W</text>
<text fill="#b8b0a0" text-anchor="middle" y="328" x="340" class="room-body">You start here</text>

<!-- KeyRoom (right) -->
<rect stroke-width="1" stroke="#4e40a0" fill="#2e2060" rx="12" height="120" width="185" y="230" x="476"/>
<text fill="#d0c8f8" text-anchor="middle" y="257" x="568" class="room-title">3. KeyRoom</text>
<text fill="#b8b0e0" text-anchor="middle" y="277" x="568" class="room-body">Items: Key</text>
<text fill="#b8b0e0" text-anchor="middle" y="294" x="568" class="room-body">Monster: none</text>
<text fill="#b8b0e0" text-anchor="middle" y="311" x="568" class="room-body">Exits: ← Start</text>

<!-- Arrow: Start ← → DeathRoom -->
<line marker-end="url(#arrow-red)" stroke-width="1.2" stroke="#c0392b" y2="290" x2="205" y1="290" x1="240"/>
<text y="282" x="215" class="lbl">☠</text>

<!-- Arrow: Start ← → KeyRoom -->
<line marker-start="url(#arrow)" marker-end="url(#arrow)" stroke-width="1.2" stroke="#888" y2="290" x2="476" y1="290" x1="440"/>


<!-- ============ ROW 3: SwordRoom (below Start) ============ -->
<rect stroke-width="1" stroke="#3a6a3a" fill="#1a3a1a" rx="12" height="120" width="200" y="430" x="240"/>
<text fill="#b0e0b0" text-anchor="middle" y="457" x="340" class="room-title">5. SwordRoom</text>
<text fill="#90c090" text-anchor="middle" y="477" x="340" class="room-body">Items: Sword</text>
<text fill="#90c090" text-anchor="middle" y="494" x="340" class="room-body">Monster: none</text>
<text fill="#90c090" text-anchor="middle" y="511" x="340" class="room-body">Exits: ↑ Start</text>
<text fill="#90c090" text-anchor="middle" y="528" x="340" class="room-body">↓ MonsterRoom</text>

<!-- Arrow: Start ↕ SwordRoom -->
<line marker-start="url(#arrow)" marker-end="url(#arrow)" stroke-width="1.2" stroke="#888" y2="430" x2="340" y1="350" x1="340"/>


<!-- ============ ROW 4: MonsterRoom (below SwordRoom) ============ -->
<rect stroke-width="1" stroke="#8a2020" fill="#5a1515" rx="12" height="130" width="200" y="620" x="240"/>
<text fill="#f0c0c0" text-anchor="middle" y="647" x="340" class="room-title">6. MonsterRoom</text>
<text fill="#d0a0a0" text-anchor="middle" y="667" x="340" class="room-body">Items: none</text>
<text fill="#d0a0a0" text-anchor="middle" y="684" x="340" class="room-body">Monster: Dragon</text>
<text fill="#d0a0a0" text-anchor="middle" y="701" x="340" class="room-body">Needs: Sword to fight</text>
<text fill="#d0a0a0" text-anchor="middle" y="718" x="340" class="room-body">Leave alive = ☠ death</text>
<text fill="#d0a0a0" text-anchor="middle" y="735" x="340" class="room-body">Exit: ↑ SwordRoom</text>

<!-- Arrow: SwordRoom ↕ MonsterRoom -->
<line marker-start="url(#arrow)" marker-end="url(#arrow)" stroke-width="1.2" stroke="#888" y2="620" x2="340" y1="550" x1="340"/>
<text y="590" x="350" class="lbl">fight or die</text>


<!-- ============ Win label ============ -->
<text fill="#e8e0d0" font-weight="700" font-size="13" text-anchor="middle" y="790" x="340">🏆  Enter WinRoom with Key → Player.IsWinner = true</text>

</svg>
